# TravelMemory Frontend Nginx Configuration
# Location on EC2: /etc/nginx/sites-available/tm-frontend
# Purpose: Serve React SPA build files, handle client-side routing

server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    # Handle React Router — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets for 1 year (they have hashed filenames)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
}
